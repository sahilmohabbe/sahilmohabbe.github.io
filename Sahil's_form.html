 div {

	    var msg = new Array();

      var message = "Following Details are Required\n";

		    msg[0] = "Name is Required";
        flag = 0;

	    {
		    msg[1] = "Select Gender";
		    flag = 0;

      else { msg[1] = ""; }
      if(flag == 0)
	    {

		    {

			    }

		    return false;
	    }
	    else
	    {
		    return true;
	    }
      if (email.value == "") {
				msg[5] = "Email address is Required";
				flag = 0;
			} else { msg[5] = ""; }

</script>

  <h3 id="abc"></h3>

 <b>Department</b>

 <input type="text" placeholder="Enter Email" name="email" required>
